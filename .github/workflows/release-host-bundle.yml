name: Release Host Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag/version to publish, for example v1.0.1'
        required: false
        default: ''
      publish:
        description: 'Publish the generated bundle to GitHub Releases'
        required: false
        default: false
        type: boolean

jobs:
  build-host-bundle:
    name: Build Host Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch repository source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/tizenclaw"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf "${workdir}"
          git init "${workdir}"
          git -C "${workdir}" remote add origin "${repo_url}"
          git -C "${workdir}" fetch --depth 1 origin "${GITHUB_SHA}"
          git -C "${workdir}" checkout --detach FETCH_HEAD

          echo "WORKDIR=${workdir}" >> "${GITHUB_ENV}"

      - name: Install host build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            iproute2 \
            libssl-dev \
            make \
            pkg-config \
            perl \
            python3

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          "${HOME}/.cargo/bin/rustc" --version
          "${HOME}/.cargo/bin/cargo" --version

      - name: Resolve bundle version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
            PUBLISH="true"
          elif [[ "${INPUT_PUBLISH:-false}" == "true" && -z "${INPUT_VERSION}" ]]; then
            echo "Manual publish requires the version input." >&2
            exit 1
          elif [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
            PUBLISH="${INPUT_PUBLISH:-false}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
            PUBLISH="false"
          fi

          echo "BUNDLE_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "PUBLISH_RELEASE=${PUBLISH}" >> "${GITHUB_ENV}"

      - name: Build host release bundle
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          chmod +x scripts/create_host_release_bundle.sh
          scripts/create_host_release_bundle.sh \
            --version "${BUNDLE_VERSION}" \
            --output-dir dist
          ls -lh dist

      - name: Publish GitHub Release asset
        if: env.PUBLISH_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd "${WORKDIR}"

          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

          if gh release view "${BUNDLE_VERSION}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${BUNDLE_VERSION}" dist/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            create_args=(
              "${BUNDLE_VERSION}"
              dist/*
              --repo "${GITHUB_REPOSITORY}"
              --title "${BUNDLE_VERSION}"
              --notes "Automated host bundle release for ${BUNDLE_VERSION}."
            )

            if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
              create_args+=(--target "${GITHUB_SHA}")
            fi

            gh release create "${create_args[@]}"
          fi
