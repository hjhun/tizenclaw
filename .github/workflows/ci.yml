name: TizenClaw CI

on:
  push:
    branches:
      - develRust
      - main
  pull_request:
    branches:
      - develRust
      - main

jobs:
  script-sanity:
    name: Workflow And Script Sanity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch repository source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/tizenclaw"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf "${workdir}"
          git init "${workdir}"
          git -C "${workdir}" remote add origin "${repo_url}"
          git -C "${workdir}" fetch --depth 1 origin "${GITHUB_SHA}"
          git -C "${workdir}" checkout --detach FETCH_HEAD

          echo "WORKDIR=${workdir}" >> "${GITHUB_ENV}"

      - name: Validate shell scripts
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          bash -n install.sh
          bash -n deploy_host.sh
          bash -n deploy.sh
          bash -n scripts/create_host_release_bundle.sh
          bash -n scripts/test_host_bundle_install.sh
          bash -n scripts/test_local_checkout_install.sh
          bash -n scripts/tizenclaw-hostctl.sh

      - name: Enforce owner-only action policy
        run: |
          set -euo pipefail
          cd "${WORKDIR}"

          if grep -REn 'uses:\s+(actions/|dtolnay/|softprops/)' .github/workflows; then
            echo "Forbidden external GitHub Action dependency detected."
            exit 1
          fi

          echo "Workflow action ownership policy check passed."

  host-bundle-smoke:
    name: Host Bundle Smoke Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch repository source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/tizenclaw"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf "${workdir}"
          git init "${workdir}"
          git -C "${workdir}" remote add origin "${repo_url}"
          git -C "${workdir}" fetch --depth 1 origin "${GITHUB_SHA}"
          git -C "${workdir}" checkout --detach FETCH_HEAD

          echo "WORKDIR=${workdir}" >> "${GITHUB_ENV}"

      - name: Install host build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            iproute2 \
            libssl-dev \
            make \
            pkg-config \
            perl \
            python3

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          "${HOME}/.cargo/bin/rustc" --version
          "${HOME}/.cargo/bin/cargo" --version

      - name: Build host release bundle
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          bash scripts/create_host_release_bundle.sh \
            --version "ci-${GITHUB_SHA::7}" \
            --output-dir dist

      - name: Verify bundle contents
        run: |
          set -euo pipefail
          cd "${WORKDIR}"

          archive="dist/tizenclaw-host-bundle-ci-${GITHUB_SHA::7}-linux-x86_64.tar.gz"
          checksum="${archive}.sha256"

          test -f "${archive}"
          test -f "${checksum}"

          tar -tzf "${archive}" | grep -F 'bin/tizenclaw'
          tar -tzf "${archive}" | grep -F 'bin/tizenclaw-cli'
          tar -tzf "${archive}" | grep -F 'manage/tizenclaw-hostctl.sh'
          tar -tzf "${archive}" | grep -F 'bundle-manifest.json'
          if tar -tzf "${archive}" | grep -Fq 'manage/deploy_host.sh'; then
            echo "Bundle must not contain manage/deploy_host.sh"; exit 1
          fi

      - name: Run installer smoke test
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          archive="dist/tizenclaw-host-bundle-ci-${GITHUB_SHA::7}-linux-x86_64.tar.gz"
          bash scripts/test_host_bundle_install.sh --bundle "${archive}"

  local-checkout-smoke:
    name: Local Checkout Installer Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch repository source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/tizenclaw"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf "${workdir}"
          git init "${workdir}"
          git -C "${workdir}" remote add origin "${repo_url}"
          git -C "${workdir}" fetch --depth 1 origin "${GITHUB_SHA}"
          git -C "${workdir}" checkout --detach FETCH_HEAD

          echo "WORKDIR=${workdir}" >> "${GITHUB_ENV}"

      - name: Install host build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            iproute2 \
            libssl-dev \
            make \
            pkg-config \
            perl \
            python3

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          "${HOME}/.cargo/bin/rustc" --version
          "${HOME}/.cargo/bin/cargo" --version

      - name: Run local-checkout installer smoke test
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          bash scripts/test_local_checkout_install.sh

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "── tmp dirs under RUNNER_TEMP ──────────────────────────────────"
          ls -la "${RUNNER_TEMP}/" 2>/dev/null || true
          echo "── Remaining tizenclaw processes ───────────────────────────────"
          pgrep -u "$(id -u)" -af tizenclaw 2>/dev/null || echo "(none)"

  host-validation:
    name: Host Canonical Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fetch repository source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          workdir="${RUNNER_TEMP}/tizenclaw"
          repo_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          rm -rf "${workdir}"
          git init "${workdir}"
          git -C "${workdir}" remote add origin "${repo_url}"
          git -C "${workdir}" fetch --depth 1 origin "${GITHUB_SHA}"
          git -C "${workdir}" checkout --detach FETCH_HEAD

          echo "WORKDIR=${workdir}" >> "${GITHUB_ENV}"

      - name: Install host build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            cmake \
            curl \
            git \
            iproute2 \
            libssl-dev \
            make \
            pkg-config \
            perl \
            python3

      - name: Install Rust toolchain
        run: |
          set -euo pipefail
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "${HOME}/.cargo/bin" >> "${GITHUB_PATH}"
          "${HOME}/.cargo/bin/rustc" --version
          "${HOME}/.cargo/bin/cargo" --version

      - name: Run canonical host validation
        run: |
          set -euo pipefail
          cd "${WORKDIR}"
          ./deploy_host.sh --test --build-root "${RUNNER_TEMP}/tizenclaw-build"

      - name: Dump build diagnostics on failure
        if: failure()
        run: |
          BUILD_ROOT="${RUNNER_TEMP}/tizenclaw-build"
          echo "── Build root (${BUILD_ROOT}) ──────────────────────────────────"
          ls -la "${BUILD_ROOT}/" 2>/dev/null || echo "(build root absent)"
          echo ""
          echo "── debug/ named binaries ───────────────────────────────────────"
          ls -la "${BUILD_ROOT}/debug/" 2>/dev/null \
            | grep -v "^total\|^d\|deps\|build\|incremental\|\.d$\|\.rmeta$" \
            || echo "(debug dir absent or empty)"
          echo ""
          echo "── Cargo test output and daemon/contract logs appear above ─────"
